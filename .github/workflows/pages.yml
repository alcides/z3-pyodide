name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download Z3 WASM
        run: bash examples/setup.sh

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel
          cp dist/z3_pyodide-*.whl examples/

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: examples/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
